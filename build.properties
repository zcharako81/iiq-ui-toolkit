# Build properties for IIQ_UI_Toolkit plugin
plugin.name=IIQ_UI_Toolkit
plugin.display.name=IIQ UI Toolkit
plugin.version=1.1.0
plugin.src=src
plugin.build=build
plugin.dist=${plugin.build}/dist
plugin.lib=jars
plugin.ui=ui
plugin.import=import
plugin.db=db
plugin.messages=messages

# Path to your local IIQ installation. Required only for `ant build`
# (to compile Java against WEB-INF/lib). Set to your local IIQ webapp path.
# Example: iiq.home=/opt/tomcat9/webapps/identityiq
iiq.home=REPLACE_WITH_IIQ_WEBAPP_PATH
iiq.lib=${iiq.home}/WEB-INF/lib
